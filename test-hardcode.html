<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>硬编码输出检测测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        .test-result {
            margin: 20px 0;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .pass {
            background-color: #d4edda;
            border-color: #c3e6cb;
            color: #155724;
        }
        .fail {
            background-color: #f8d7da;
            border-color: #f5c6cb;
            color: #721c24;
        }
    </style>
</head>
<body>
    <h1>硬编码输出检测测试</h1>
    <div id="test-results"></div>
    
    <!-- 加载 Pyodide -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
    <!-- 加载判题引擎 -->
    <script src="js/engine-py.js"></script>
    <!-- 加载测试脚本 -->
    <script src="test-hardcode-detection.js"></script>
    
    <script>
        // 显示测试结果
        function displayResult(message, isPass) {
            const resultsDiv = document.getElementById('test-results');
            const resultDiv = document.createElement('div');
            resultDiv.className = `test-result ${isPass ? 'pass' : 'fail'}`;
            resultDiv.textContent = message;
            resultsDiv.appendChild(resultDiv);
        }
        
        // 覆盖 console.log 来同时显示在页面上
        const originalLog = console.log;
        console.log = function(...args) {
            originalLog.apply(console, args);
            const message = args.join(' ');
            if (message.includes('✅')) {
                displayResult(message, true);
            } else if (message.includes('❌')) {
                displayResult(message, false);
            }
        };
    </script>
</body>
</html>
