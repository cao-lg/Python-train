<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - Python 编程实训 OJ 平台</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="container">
                <h1>Python 编程实训 OJ 平台</h1>
                <ul>
                    <li><a href="../index.html">首页</a></li>
                    <li><a href="problems.html">题目</a></li>
                    <li><a href="user.html" id="user-link">个人中心</a></li>
                    <li><button id="theme-toggle" class="theme-btn">🌙</button></li>
                </ul>
            </div>
        </nav>
    </header>
    <main>
        <section class="user-section">
            <div class="container">
                <div id="login-register">
                    <h2>登录/注册</h2>
                    <div class="auth-forms">
                        <div class="login-form">
                            <h3>登录</h3>
                            <form id="login-form">
                                <div class="form-group">
                                    <label for="login-username">用户名</label>
                                    <input type="text" id="login-username" required>
                                </div>
                                <div class="form-group">
                                    <label for="login-password">密码</label>
                                    <input type="password" id="login-password" required>
                                </div>
                                <button type="submit">登录</button>
                            </form>
                        </div>
                        <div class="register-form">
                            <h3>注册</h3>
                            <form id="register-form">
                                <div class="form-group">
                                    <label for="register-username">用户名</label>
                                    <input type="text" id="register-username" required>
                                </div>
                                <div class="form-group">
                                    <label for="register-password">密码</label>
                                    <input type="password" id="register-password" required>
                                </div>
                                <div class="form-group">
                                    <label for="register-confirm-password">确认密码</label>
                                    <input type="password" id="register-confirm-password" required>
                                </div>
                                <button type="submit">注册</button>
                            </form>
                        </div>
                    </div>
                </div>
                <div id="user-info" style="display: none;">
                    <h2>个人信息</h2>
                    <div class="user-stats">
                        <div class="stat-item">
                            <span class="stat-label">用户名</span>
                            <span class="stat-value" id="username">用户名</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">AC 题目数</span>
                            <span class="stat-value" id="ac-count">0</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">总提交数</span>
                            <span class="stat-value" id="submit-count">0</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">AC 率</span>
                            <span class="stat-value" id="ac-rate">0%</span>
                        </div>
                    </div>
                    <div class="submission-history">
                        <h3>提交历史</h3>
                        <div id="submission-list">
                        </div>
                    </div>
                    <button id="logout-btn">退出登录</button>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <div class="container">
            <p>&copy; 2026 Python 编程实训 OJ 平台</p>
        </div>
    </footer>
    <script src="../js/db.js"></script>
    <script src="../js/core.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/user.js"></script>
</body>
</html>
